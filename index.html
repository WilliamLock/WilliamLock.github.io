<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>William Lock Apps</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111;
        color: #f6f1e8;
      }

      main {
        width: min(720px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 24px;
        font-size: 34px;
        font-weight: 700;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 14px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid rgba(214, 163, 82, 0.45);
        border-radius: 14px;
        color: inherit;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.04);
      }

      a:hover {
        border-color: rgba(214, 163, 82, 0.9);
        background: rgba(214, 163, 82, 0.1);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>William Lock Apps</h1>
      <ul>
        <li><a href="/codebreaker-classic/">Codebreaker Classic</a></li>
        <li><a href="/cute-tic-tac-toe/">Cute Tic Tac Toe Fun</a></li>
        <li><a href="https://williamlock.github.io/cute-tic-tac-toe-support/">Cute Tic Tac Toe Support</a></li>
      </ul>
    </main>
  </body>
</html>
